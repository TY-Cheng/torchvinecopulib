[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.urls]
# homepage = ""
repository = "https://github.com/TY-Cheng/torchvinecopulib"
documentation = "https://ty-cheng.github.io/torchvinecopulib/"
"Bug Tracker" = "https://github.com/TY-Cheng/torchvinecopulib/issues/new"

[project]
name = "torchvinecopulib"
version = "2024.12.1"
requires-python = ">=3.10"
authors = [{ name = "Tuoyuan Cheng", email = "tuoyuan.cheng@nus.edu.sg" }]
maintainers = [
    { name = "Saikiran Reddy Poreddy", email = "saikiran.poreddy@u.nus.edu" },
]
description = "yet another vine copula library for PyTorch."
readme = "README.md"
keywords = ["vine copula", "copula", "torch"]
classifiers = [
    # "Private :: Do Not Upload",
    "License :: OSI Approved :: GNU General Public License v3 (GPLv3)",
    "Environment :: GPU :: NVIDIA CUDA :: 12",
    "Operating System :: Microsoft :: Windows :: Windows 10",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering",
]
dependencies = ["numpy>=2", "scipy"]
[dependency-groups]
dev = [
    "coverage",
    "fastkde",
    "furo",
    "ipykernel",
    "matplotlib",
    "pandas",
    "pot",
    "pytest",
    "pyvinecopulib",
    "ruff",
    "scikit-learn",
    "sphinx_pyproject",
    "sphinx",
    "tokenize-rt",
    "yfinance",
]

[project.optional-dependencies]
cpu = ["torch>=2"]
cu124 = ["torch>=2"]

[tool.uv]
managed = true
default-groups = ["dev"]
conflicts = [[{ extra = "cpu" }, { extra = "cu124" }]]

[tool.uv.sources]
torch = [
    { index = "torch-cpu", extra = "cpu" },
    { index = "torch-cu124", extra = "cu124" },
]

[[tool.uv.index]]
name = "torch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[[tool.uv.index]]
name = "torch-cu124"
url = "https://download.pytorch.org/whl/cu124"
explicit = true

[[tool.uv.index]]
name = "testpypi"
url = "https://test.pypi.org/simple/"
publish-url = "https://test.pypi.org/legacy/"
explicit = true

[tool.sphinx-pyproject]
source-dir = "docs"
build-dir = "docs/_build"
all_files = true
extensions = [
    "sphinx.ext.autodoc",
    "sphinx.ext.autosectionlabel",
    "sphinx.ext.autosummary",
    "sphinx.ext.coverage",
    "sphinx.ext.doctest",
    "sphinx.ext.extlinks",
    "sphinx.ext.githubpages",
    "sphinx.ext.graphviz",
    "sphinx.ext.ifconfig",
    "sphinx.ext.imgconverter",
    "sphinx.ext.inheritance_diagram",
    "sphinx.ext.intersphinx",
    "sphinx.ext.napoleon",
    "sphinx.ext.todo",
    "sphinx.ext.viewcode",
]
exclude_patterns = ["_build", "Thumbs.db", ".DS_Store"]
html_theme = "furo"
